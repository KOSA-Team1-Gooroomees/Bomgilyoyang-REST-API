file.upload-dir=uploads
spring.application.name=neulbomgil-backend
server.port=8088
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=jdbc:mysql://localhost:3306/neulbomgil?characterEncoding=UTF-8&serverTimezone=UTC
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database=mysql
logging.level.org.hibernate=info
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
vworld.api.key=${API_KEY}
# SQL 로그
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.orm.jdbc.bind=TRACE
#spring.jpa.properties.hibernate.use_sql_comments=true
# JWT 설정
application.security.jwt.secret=${JWT_SECRET}
application.security.jwt.access-token-expiration=1800000
application.security.jwt.refresh-token-expiration=604800000
# 메일 설정
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_ID}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# 카카오 로그인 설정
kakao.auth.client=${KAKAO_KEY}
kakao.auth.client_secret_key=${KAKAO_CLIENT_KEY}
kakao.auth.url=${KAKAO_LOGIN_URL}
# 카카오 지도 API 설정
kakao.map.api-key=${KAKAO_MAP_API_KEY}