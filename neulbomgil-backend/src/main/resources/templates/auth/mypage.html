</head>

<div th:replace="~{fragments/header :: header}"></div>
<main class="max-w-2xl mx-auto px-4 py-8 space-y-6">

    <div class="flex-1 max-w-2xl space-y-6">

        <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <h2 class="text-xl font-bold text-gray-900 mb-1">내 정보 수정</h2>
            <p class="text-sm text-gray-500 mb-8">아이디와 이메일을 수정할 수 있습니다.</p>

            <form th:action="@{/mypage/info}" method="post" class="space-y-6">

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">아이디</label>
                    <div class="relative">
                        <input type="text" name="username" value="borakim"
                               class="w-full px-4 py-3 border border-green-500 rounded-lg focus:outline-none focus:ring-1 focus:ring-brand-green text-sm text-gray-900 bg-white">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">영문, 숫자 포함 4~20자</p>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">이메일</label>
                    <div class="relative">
                        <input type="email" name="email" value="bora.kim@example.com"
                               class="w-full px-4 py-3 border border-green-500 rounded-lg focus:outline-none focus:ring-1 focus:ring-brand-green text-sm text-gray-900 bg-white">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">유효한 이메일 주소를 입력해주세요.</p>
                </div>

                <div class="flex justify-end pt-4">
                    <button type="submit" class="bg-brand-green hover:bg-brand-greenHover text-white font-medium px-8 py-3 rounded-lg transition-colors duration-200">
                        저장하기
                    </button>
                </div>
            </form>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <h2 class="text-xl font-bold text-gray-900 mb-1">비밀번호 변경</h2>
            <p class="text-sm text-gray-500 mb-8">안전한 계정 사용을 위해 주기적으로 비밀번호를 변경하세요.</p>

            <form th:action="@{/mypage/password}" method="post" class="space-y-6">

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">현재 비밀번호</label>
                    <div class="relative">
                        <input type="password" name="currentPassword" placeholder="현재 비밀번호를 입력해주세요."
                               class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-green focus:ring-1 focus:ring-brand-green text-sm placeholder-gray-400 bg-gray-50/50">
                        <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">새 비밀번호</label>
                    <div class="relative">
                        <input type="password" name="newPassword" placeholder="새 비밀번호를 입력해주세요."
                               class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-green focus:ring-1 focus:ring-brand-green text-sm placeholder-gray-400 bg-gray-50/50">
                        <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">새 비밀번호 확인</label>
                    <div class="relative">
                        <input type="password" name="confirmNewPassword" placeholder="새 비밀번호를 다시 입력해주세요."
                               class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-green focus:ring-1 focus:ring-brand-green text-sm placeholder-gray-400 bg-gray-50/50">
                        <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">영문, 숫자, 특수문자 포함 8~20자</p>
                </div>

                <div class="flex justify-end pt-4">
                    <button type="submit" class="bg-brand-green hover:bg-brand-greenHover text-white font-medium px-8 py-3 rounded-lg transition-colors duration-200">
                        변경하기
                    </button>
                </div>
            </form>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 border-t-[3px] border-t-red-50">
            <h2 class="text-xl font-bold text-red-500 mb-1">회원 탈퇴</h2>
            <p class="text-sm text-gray-500 mb-8">회원 탈퇴 시 계정 정보와 즐겨찾기, 리뷰 등 모든 데이터가 삭제되며,<br>복구가 불가능합니다.</p>

            <form th:action="@{/mypage/withdraw}" method="post" class="space-y-6">

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">비밀번호 확인</label>
                    <div class="relative">
                        <input type="password" name="withdrawPassword" placeholder="비밀번호를 입력해주세요."
                               class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-red-400 focus:ring-1 focus:ring-red-400 text-sm placeholder-gray-400 bg-gray-50/50">
                        <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        </button>
                    </div>
                </div>

                <div class="flex justify-end pt-4">
                    <button type="submit" class="border border-red-200 text-red-500 bg-white hover:bg-red-50 font-medium px-8 py-3 rounded-lg transition-colors duration-200">
                        회원 탈퇴하기
                    </button>
                </div>
            </form>
        </section>

    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
