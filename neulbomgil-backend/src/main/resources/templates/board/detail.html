<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>게시글 작성 - 봄길 요양</title>

    <link rel="stylesheet" th:href="@{/css/main.css}"/>

</head>
<body class="bg-gray-100 text-gray-800">

<!-- NAVBAR -->
<nav>
    <div th:replace="~{fragments/header :: header}"></div>
</nav>

<!-- LAYOUT -->
<div class="max-w-6xl mx-auto px-4 py-6 grid grid-cols-[220px_1fr] gap-5">

    <!-- SIDEBAR -->
    <aside class="flex flex-col gap-4">
        <div class="bg-primary-light rounded-xl p-5 relative overflow-hidden min-h-[160px]">
            <p class="text-sm font-bold text-primary-dark mb-2">봄길요양 커뮤니티</p>
            <p class="text-xs text-gray-600 leading-relaxed">시설 이용 정보와<br/>다양한 소식을<br/>함께 나눠요.</p>
            <img src="/images/sheep.png" alt="마스코트"
                 class="absolute bottom-0 right-2 w-20 opacity-85"
                 onerror="this.style.display='none'"/>
        </div>
        <a th:href="@{/boards/new}"
           class="block w-full py-3 bg-primary hover:bg-primary-dark text-white font-bold rounded-lg text-sm text-center no-underline transition-colors">
            ✏️ 글쓰기
        </a>
        <div class="border border-gray-200 rounded-xl p-4">
            <p class="text-sm font-bold mb-1.5">도움이 필요하신가요?</p>
            <p class="text-xs text-gray-500 leading-relaxed mb-3">관리자와 1:1 채팅으로<br/>빠르게 문의해보세요.</p>
            <button class="w-full py-2 bg-[#a8c5b5] hover:bg-[#8fb3a0] text-white text-xs font-semibold rounded-md border-0 cursor-pointer transition-colors">
                채팅하기
            </button>
        </div>
    </aside>

    <!-- 작성 메인 -->
    <main class="bg-white rounded-xl p-8 shadow-sm">
        <div class="flex justify-between items-start mb-7">
            <div>
                <h2 class="text-xl font-bold">게시글 작성</h2>
                <p class="text-xs text-gray-400 mt-1">게시판 > 새 게시글 작성</p>
            </div>
            <a th:href="@{/boards}"
               class="flex items-center gap-1.5 px-5 py-2 border border-gray-200 rounded-full text-sm text-gray-600 no-underline hover:border-primary-mid hover:text-primary transition-colors">
                &#8249; 목록으로 돌아가기
            </a>
        </div>

        <div class="flex flex-col gap-5">
            <!-- 제목 -->
            <div class="grid grid-cols-[80px_1fr] items-start">
                <label class="text-base font-bold pt-2.5" for="title">제목</label>
                <input type="text" id="title" maxlength="100"
                       placeholder="제목을 입력해주세요."
                       class="px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm w-full focus:outline-none focus:border-primary-mid transition-colors"/>
            </div>

            <!-- 내용 -->
            <div class="grid grid-cols-[80px_1fr] items-start">
                <label class="text-base font-bold pt-2.5" for="content">내용</label>
                <textarea id="content" rows="10"
                          placeholder="내용을 입력해주세요."
                          class="px-3.5 py-3 border border-gray-200 rounded-lg text-sm w-full resize-y leading-relaxed focus:outline-none focus:border-primary-mid transition-colors"></textarea>
            </div>

            <!-- 파일 업로드 -->
            <div class="grid grid-cols-[80px_1fr] items-start">
                <label class="text-base font-bold pt-2.5">첨부파일</label>
                <div>
                    <div id="dropZone"
                         class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center cursor-pointer bg-gray-50 hover:border-primary-mid hover:bg-primary-light transition-colors"
                         onclick="document.getElementById('fileInput').click()"
                         ondragover="handleDragOver(event)"
                         ondragleave="handleDragLeave(event)"
                         ondrop="handleDrop(event)">
                        <div class="text-3xl mb-2">📎</div>
                        <p class="text-sm text-gray-500">
                            <span class="text-primary font-semibold">클릭</span>하거나 파일을 드래그해서 업로드하세요
                        </p>
                        <p class="text-xs text-gray-400 mt-1">이미지(jpg, png, gif), PDF, Word, Excel 등 · 파일당 최대 10MB · 최대 5개</p>
                    </div>
                    <input type="file" id="fileInput" multiple
                           accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.hwp"
                           class="hidden"
                           onchange="handleFileSelect(event)"/>
                    <div id="filePreviewList" class="flex flex-col gap-2 mt-3"></div>
                </div>
            </div>

            <!-- 버튼 -->
            <div class="flex justify-center gap-3 mt-2">
                <button type="button" onclick="location.href='/boards'"
                        class="px-10 py-2.5 border border-gray-200 bg-white text-gray-600 rounded-lg text-sm font-semibold cursor-pointer hover:border-gray-400 transition-colors">
                    취소
                </button>
                <button type="button" id="submitBtn" onclick="submitBoard()"
                        class="px-10 py-2.5 bg-primary hover:bg-primary-dark text-white rounded-lg text-sm font-bold cursor-pointer border-0 transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed">
                    등록하기
                </button>
            </div>
        </div>
    </main>
</div>

<script th:inline="javascript">
    const csrfToken  = /*[[${_csrf.token}]]*/ '';
    const csrfHeader = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
    let selectedFiles = [];

    function handleFileSelect(e) { addFiles(Array.from(e.target.files)); e.target.value = ''; }
    function handleDragOver(e) {
        e.preventDefault();
        document.getElementById('dropZone').classList.add('border-primary-mid', 'bg-primary-light');
    }
    function handleDragLeave() {
        document.getElementById('dropZone').classList.remove('border-primary-mid', 'bg-primary-light');
    }
    function handleDrop(e) { e.preventDefault(); handleDragLeave(); addFiles(Array.from(e.dataTransfer.files)); }

    function addFiles(newFiles) {
        for (const file of newFiles) {
            if (selectedFiles.length >= 5) { alert('파일은 최대 5개까지 첨부할 수 있습니다.'); break; }
            if (file.size > 10 * 1024 * 1024) { alert(`${file.name}: 파일 크기가 10MB를 초과합니다.`); continue; }
            selectedFiles.push(file);
        }
        renderFilePreview();
    }

    function renderFilePreview() {
        const list = document.getElementById('filePreviewList');
        list.innerHTML = '';
        selectedFiles.forEach((file, idx) => {
            const isImage = file.type.startsWith('image/');
            const item = document.createElement('div');
            item.className = 'flex items-center gap-2.5 px-3 py-2 bg-white border border-gray-200 rounded-lg';
            const thumb = isImage
                ? `<img src="${URL.createObjectURL(file)}" class="w-10 h-10 rounded-md object-cover flex-shrink-0"/>`
                : `<div class="w-10 h-10 rounded-md bg-primary-light flex items-center justify-center text-xl flex-shrink-0">${getFileIcon(file.name)}</div>`;
            item.innerHTML = `
        ${thumb}
        <span class="text-xs text-gray-700 flex-1 truncate" title="${file.name}">${file.name}</span>
        <span class="text-xs text-gray-400 flex-shrink-0">${formatSize(file.size)}</span>
        <button onclick="removeFile(${idx})"
                class="text-gray-300 hover:text-red-400 text-lg leading-none border-0 bg-transparent cursor-pointer flex-shrink-0 transition-colors">✕</button>
      `;
            list.appendChild(item);
        });
    }

    function removeFile(idx) { selectedFiles.splice(idx, 1); renderFilePreview(); }

    function submitBoard() {
        const title   = document.getElementById('title').value.trim();
        const content = document.getElementById('content').value.trim();
        if (!title)   { alert('제목을 입력해주세요.'); return; }
        if (!content) { alert('내용을 입력해주세요.'); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.textContent = '등록 중...';

        const formData = new FormData();
        formData.append('data', new Blob([JSON.stringify({ title, content })], { type: 'application/json' }));
        selectedFiles.forEach(f => formData.append('files', f));

        fetch('/api/boards/inserts', {
            method: 'POST',
            headers: { [csrfHeader]: csrfToken },
            body: formData
        })
            .then(res => {
                if (res.ok) { alert('게시글이 등록되었습니다.'); location.href = '/boards'; }
                else { alert('등록 중 오류가 발생했습니다.'); btn.disabled = false; btn.textContent = '등록하기'; }
            })
            .catch(() => { alert('서버 오류가 발생했습니다.'); btn.disabled = false; btn.textContent = '등록하기'; });
    }

    function formatSize(b) {
        if (b < 1024) return b + 'B';
        if (b < 1024 * 1024) return (b / 1024).toFixed(1) + 'KB';
        return (b / (1024 * 1024)).toFixed(1) + 'MB';
    }
    function getFileIcon(name) {
        const ext = name.split('.').pop().toLowerCase();
        return { pdf:'📄', doc:'📝', docx:'📝', xls:'📊', xlsx:'📊', ppt:'📑', pptx:'📑', zip:'🗜', hwp:'📃', txt:'📋' }[ext] || '📎';
    }
</script>
</body>
</html>
