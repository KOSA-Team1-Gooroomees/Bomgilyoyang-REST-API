<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 채팅</title>

    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="m-0 bg-[#f5f5f5] font-eulyoo">

<div class="flex min-h-screen flex-col">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="flex h-[calc(100vh-58px)] bg-white">

        <section class="flex h-full w-[300px] flex-col border-r border-gray-300 bg-bg-soft">

            <div class="border-b border-gray-200 bg-white p-[10px]">
                <input
                        type="text"
                        placeholder="이름 또는 연락처 검색"
                        class="h-9 w-full rounded-lg border border-gray-300 px-3 outline-none">
            </div>

            <div class="flex-1 overflow-y-auto">

                <button
                        type="button"
                        class="flex w-full cursor-pointer items-start gap-[10px] border-b border-white/70 bg-[#b5d0ac] p-3 text-left transition hover:bg-[#9fbe95]"
                        th:each="room : ${chatRooms}"
                        th:data-room-id="${room.roomId()}"
                        th:data-room-name="${room.name()}"
                        onclick="openChatRoom(this)">

                    <img
                            th:src="@{/images/characters/rumi-face.png}"
                            class="h-10 w-10 shrink-0 rounded-full object-cover"
                            alt="프로필">

                    <div class="min-w-0 flex-1">

                        <div class="mb-1 flex items-center justify-between">
                            <div
                                    class="text-sm font-bold"
                                    th:text="${room.name()}">
                                사용자
                            </div>

                            <div
                                    class="text-[11px] text-[#333333]"
                                    th:text="${room.lastMessageAt() != null
                                    ? #temporals.format(room.lastMessageAt(), 'HH:mm')
                                    : ''}">
                                14:35
                            </div>
                        </div>

                        <div
                                class="truncate text-[12px]"
                                th:text="${room.lastMessage() != null
                                ? room.lastMessage()
                                : '새로운 문의가 있습니다.'}">
                            마지막 메시지
                        </div>

                    </div>

                    <div
                            th:if="${room.unread()}"
                            class="unread-dot h-[10px] w-[10px] shrink-0 rounded-full bg-red-500">
                    </div>

                </button>

            </div>

        </section>

        <section
                id="chatArea"
                class="hidden h-full w-[350px] flex-col border-r border-gray-300 bg-popup">

            <div class="flex h-[70px] items-center justify-between border-b border-black/15 px-5">
                <div
                        id="chatTitle"
                        class="text-[22px] font-bold">
                    관리자
                </div>

                <button
                        type="button"
                        class="cursor-pointer bg-transparent text-[42px]"
                        onclick="closeChatRoom()">
                    ×
                </button>
            </div>

            <div
                    id="chatEmpty"
                    class="flex flex-1 items-center justify-center text-lg font-bold text-black/40">
                채팅방을 선택해주세요.
            </div>

            <iframe
                    id="chatFrame"
                    class="hidden h-full w-full flex-1 border-0"
                    src="about:blank">
            </iframe>

        </section>

        <section class="flex-1 overflow-y-auto bg-[#f8faf7]">

            <div class="w-full px-10 py-9">

                <div class="mb-6">
                    <h2 class="text-[34px] font-bold text-[#222]">
                        사용자 관리
                    </h2>

                    <p class="mt-[10px] text-[15px] text-[#666]">
                        회원 정보를 조회하고 관리할 수 있습니다.
                    </p>
                </div>

                <div class="mb-6 flex gap-3">

                    <button
                            type="button"
                            class="h-[42px] cursor-pointer rounded-full bg-white px-[18px] text-sm font-bold shadow-md transition"
                            th:classappend="${type == 'all'} ? ' bg-[#dfe9dd]' : ''"
                            onclick="location.href='/admin/users'">
                        전체 사용자
                        (<span th:text="${allUserCount}">0</span>)
                    </button>

                    <button
                            type="button"
                            class="h-[42px] cursor-pointer rounded-full bg-white px-[18px] text-sm font-bold shadow-md transition"
                            th:classappend="${type == 'deleted'} ? ' bg-[#dfe9dd]' : ''"
                            onclick="location.href='/admin/users/deleted'">
                        탈퇴 사용자
                        (<span th:text="${deletedUserCount}">0</span>)
                    </button>

                </div>

                <div class="overflow-hidden rounded-[18px] bg-white shadow-lg">

                    <div class="grid grid-cols-[80px_1.1fr_1.5fr_1.1fr_100px_90px_90px_120px] items-center bg-[#f2f5ef] px-6 py-[18px] text-[15px] font-bold">
                        <div>번호</div>
                        <div>이름(아이디)</div>
                        <div>이메일</div>
                        <div>가입일</div>
                        <div>상태</div>
                        <div>게시글</div>
                        <div>댓글</div>
                        <div>관리</div>
                    </div>

                    <div
                            th:each="user : ${users}"
                            class="grid grid-cols-[80px_1.1fr_1.5fr_1.1fr_100px_90px_90px_120px] items-center border-t border-gray-200 bg-white px-6 py-[18px] hover:bg-[#fafcf8]">

                        <div th:text="${user.userId()}">1</div>

                        <div th:text="${user.name()} ?: '-'">이름</div>

                        <div th:text="${user.email()} ?: '-'">email@test.com</div>

                        <div th:text="${user.createdAt()} ?: '-'">2026.03.14</div>

                        <div>
                            <span
                                    th:if="${user.status().name() == 'ACTIVE'}"
                                    class="inline-flex h-7 w-14 items-center justify-center rounded-full bg-[#8fb08e] text-[13px] font-bold text-white">
                                활성
                            </span>

                            <span
                                    th:if="${user.status().name() == 'REMOVED'}"
                                    class="inline-flex h-7 w-14 items-center justify-center rounded-full bg-[#cc705f] text-[13px] font-bold text-white">
                                탈퇴
                            </span>
                        </div>

                        <div th:text="${user.boardCount() != null ? user.boardCount() : 0}">0</div>

                        <div th:text="${user.replyCount() != null ? user.replyCount() : 0}">0</div>

                        <div>
                            <form
                                    th:action="@{/admin/users/{userId}/status(userId=${user.userId()})}"
                                    method="post">

                                <button
                                        type="submit"
                                        class="cursor-pointer rounded-[10px] bg-[#7faebb] px-[14px] py-2 text-[13px] font-bold text-white transition hover:bg-[#6b98a5]">
                                    상태변경
                                </button>

                            </form>
                        </div>

                    </div>

                </div>

            </div>

        </section>

    </div>

</div>

<script>
    const chatArea = document.getElementById("chatArea");
    const chatFrame = document.getElementById("chatFrame");
    const chatEmpty = document.getElementById("chatEmpty");
    const chatTitle = document.getElementById("chatTitle");

    function openChatRoom(element) {
        const roomId = element.dataset.roomId;
        const roomName = element.dataset.roomName;

        chatArea.classList.remove("hidden");
        chatArea.classList.add("flex");

        chatTitle.textContent = roomName;

        chatEmpty.classList.add("hidden");

        chatFrame.classList.remove("hidden");
        chatFrame.src = "/chatrooms/" + roomId + "/message";

        const unreadDot = element.querySelector(".unread-dot");

        if (unreadDot) {
            unreadDot.classList.add("hidden");
        }
    }

    function closeChatRoom() {
        chatFrame.src = "about:blank";
        chatFrame.classList.add("hidden");

        chatEmpty.classList.remove("hidden");
        chatEmpty.classList.add("flex");

        chatTitle.textContent = "관리자";

        chatArea.classList.remove("flex");
        chatArea.classList.add("hidden");
    }
</script>

</body>
</html>
