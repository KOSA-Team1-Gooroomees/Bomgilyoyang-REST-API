<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>늘봄요양</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="min-h-screen">

<div th:replace="~{fragments/header :: header}"></div>

<!-- Hero -->
<section class="flex flex-col items-center justify-center text-center text-white px-5"
         style="height:360px; background: linear-gradient(110deg, #7faebb 0%, #bdd8b9 100%);">
<div>
  <h1 class="text-4xl font-bold leading-[1.35] tracking-[4px] mb-7">
    늘 봄날 같은 산책을 위한<br>
    복지시설 선택 지도 서비스
  </h1>
<br>
  <p class="font-bold tracking-[2px] mb-11" style="font-size:22px;">
    원하는 지역을 검색하고 주변 복지시설과 공원을 함께 확인해보세요
  </p>
  <br>
  <div class="flex items-center justify-center gap-3 mx-auto" style="width:100%;">
    <input
            type="text"
            placeholder="예 : 서울특별시 송파구 중대로 135"
            class="flex-1 px-4 rounded-lg bg-white text-sm"
            style="width:300px; height:42px; color:#222;"
    >
    <button
            type="button"
            class="bg-screen-button text-white font-bold rounded-xl transition hover:bg-primary-hover"
            style="width:72px; height:42px;">
      검색
    </button>
  </div>

  </div>
</section>

<!-- Service -->
<section class="px-12 py-12 pb-[70px]"
         style="min-height:330px; background: linear-gradient(110deg, #a9cdd0 0%, #d2dfc3 100%);">
<br>
  <h2 class="text-center font-bold tracking-[4px] mb-8" style="font-size:30px;">
    늘봄요양만의 특별한 서비스
  </h2>

  <div class="flex flex-wrap justify-center gap-4">

    <article class="rounded-[var(--radius-main)] border border-white/70 p-5"
             style="width:280px; min-height:150px; box-shadow:0 4px 6px rgba(0,0,0,0.22); background: rgba(255,255,255,0.35);">
      <div class="mb-3">
        <img th:src="@{/images/icons/park-icon.png}" alt="공원 아이콘" style="width:28px; height:28px;">
      </div>
      <br>
      <h3 class="font-bold mb-4" style="font-size:18px;">공원 환경 기반 시설 추천</h3>
      <p class="text-sm font-bold leading-relaxed">
        시설 주변의 공원을 기반으로 한<br>
        늘봄요양만의 공원점수로<br>
        더 쾌적한 시설 선택을 도와드립니다.
      </p>
    </article>

    <article class="rounded-[var(--radius-main)] border border-white/70 p-5"
             style="width:280px; min-height:150px; box-shadow:0 4px 6px rgba(0,0,0,0.22); background: rgba(255,255,255,0.35);">
      <div class="mb-3">
        <img th:src="@{/images/icons/gps-icon.png}" alt="지도 아이콘" style="width:28px; height:28px;">
      </div>
      <br>
      <h3 class="font-bold mb-4" style="font-size:18px;">지도 기반 시설 탐색</h3>
      <p class="text-sm font-bold leading-relaxed">
        원하는 지역을 검색하면<br>
        지도에서 한눈에<br>
        비교하고 확인할 수 있습니다.
      </p>
    </article>

    <article class="rounded-[var(--radius-main)] border border-white/70 p-5"
             style="width:280px; min-height:150px; box-shadow:0 4px 6px rgba(0,0,0,0.22); background: rgba(255,255,255,0.35);">
      <div class="mb-3">
        <img th:src="@{/images/icons/chat-icon.png}" alt="채팅 아이콘" style="width:28px; height:28px;">
      </div>
      <br>
      <h3 class="font-bold mb-4" style="font-size:18px;">관리자 1:1 상담 채팅</h3>
      <p class="text-sm font-bold leading-relaxed">
        문의사항에 대해<br>
        관리자와 실시간 1:1 채팅으로<br>
        빠르게 상담할 수 있습니다.
      </p>
    </article>

  </div>
</section>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
