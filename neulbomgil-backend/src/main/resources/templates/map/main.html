<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>늘봄길 - CareMap</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript"
            th:src="'//dapi.kakao.com/v2/maps/sdk.js?appkey='+${kakaoMapApiKey}+'&libraries=services'"></script>
</head>
<body class="bg-white">
<div th:replace="~{fragments/header :: header}"></div>
<div class="flex flex-col md:flex-row w-screen h-screen overflow-hidden bg-white">

    <div class="w-full md:w-[400px] h-full flex flex-col border-r border-gray-200 z-10 shadow-lg">
        <div class="p-4 bg-white border-b border-gray-100">
            <input type="text" id="keywordInput" placeholder="시설명을 검색하세요"
                   class="w-full px-4 py-3 rounded-xl bg-gray-50 border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 transition-all outline-none"/>
        </div>
        <div id="facilityList" class="flex-1 overflow-y-auto p-4 space-y-4">
        </div>
        <div id="listLoading" class="hidden text-center py-4 text-gray-400 animate-pulse text-sm">로딩 중...</div>
    </div>

    <div id="detailSidebar"
         class="hidden absolute left-[400px] w-[370px] h-full bg-white shadow-2xl z-20 border-l border-gray-100 flex flex-col">
        <button id="closeSidebarBtn"
                class="absolute top-4 right-4 w-9 h-9 flex items-center justify-center bg-white shadow-md rounded-full hover:bg-gray-50 transition-all z-30 border border-gray-100 text-gray-500 text-lg">
            ✕
        </button>

        <div class="w-full h-60 bg-gray-100 shrink-0">
            <img id="detailImage" src="" alt="" class="w-full h-full object-cover"/>
        </div>

        <div class="flex-1 overflow-y-auto p-7">
            <div class="mb-6">
                <span class="inline-block text-[11px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded mb-2.5">시설 상세정보</span>
                <div class="flex items-center justify-between gap-2">
                    <h2 id="detailName" class="text-2xl font-extrabold text-gray-900 leading-tight"></h2>
                    <button id="favoriteBtn"
                            class="shrink-0 w-10 h-10 flex items-center justify-center rounded-full border transition-all bg-gray-50 border-gray-100 text-gray-400 hover:text-red-400">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             strokeWidth="2" class="w-6 h-6">
                            <path strokeLinecap="round" strokeLinejoin="round"
                                  d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/>
                        </svg>
                    </button>
                </div>
                <div class="flex items-center mt-2.5 justify-between">
                    <div class="flex items-center space-x-1">
                        <div id="detailStars" class="flex items-center text-yellow-400"></div>
                        <span id="detailScore" class="text-sm font-bold text-gray-700 ml-1"></span>
                    </div>
                    <div class="flex items-center gap-2 text-[12px]">
                        <span class="flex items-center gap-1 font-bold text-gray-600 bg-gray-100 px-2 py-1 rounded-md">정원 <span
                                id="capacityCnt" class="text-blue-600">0</span></span>
                        <span class="flex items-center gap-1 font-bold text-gray-600 bg-gray-100 px-2 py-1 rounded-md">현원 <span
                                id="currentCnt" class="text-green-600">0</span></span>
                    </div>
                </div>
            </div>

            <div class="h-px bg-gray-100 w-full mb-6"></div>

            <div class="space-y-5 text-[15px]">
                <div class="flex items-start">
                    <span class="mr-4 mt-0.5 w-6 text-center">📍</span>
                    <div class="flex-1">
                        <p id="detailNewAddress" class="font-medium text-gray-800 leading-snug"></p>
                        <p id="detailLotAddress" class="text-xs text-gray-400 mt-1.5"></p>
                    </div>
                </div>
                <div id="detailPhoneContainer" class="flex items-center">
                    <span class="mr-4 w-6 text-center">📞</span>
                    <p id="detailTel"
                       class="font-medium text-blue-600 hover:underline cursor-pointer tracking-wide"></p>
                </div>
            </div>

            <div class="h-px bg-gray-100 w-full my-8"></div>

            <div>
                <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
                    <img src="/images/icons/score-true.png" alt="공원"
                         class="w-7 h-7 object-contain border border-transparent rounded-full"> 인근 공원 <span
                        id="parkCount" class="text-green-600 text-sm font-medium">0</span>
                </h3>
                <div id="nearbyParkList" class="flex flex-col gap-3"></div>
            </div>
        </div>
    </div>

    <div class="flex-1 relative">
        <div id="mapContainer" class="w-full h-full"></div>
    </div>
</div>

<script th:src="@{/js/map.js}"></script>
</body>
</html>
