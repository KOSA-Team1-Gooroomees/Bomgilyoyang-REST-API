<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>늘봄길 디자인 시스템 테스트</title>
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>

<body class="bg-bg-soft font-sans min-h-screen flex items-center justify-center p-10">

<div class="bg-white rounded-[var(--radius-main)] shadow-xl border border-border w-full max-w-4xl p-8">

    <h1 class="font-eulyoo text-4xl text-primary mb-2 text-center">
        늘봄길
    </h1>

    <p class="text-center text-slate-600 mb-8">
        공통 폰트와 컬러 시스템 테스트 화면입니다.
    </p>

    <!-- 버튼 색상 테스트 -->
    <section class="mb-8">
        <h2 class="font-bold mb-4">버튼 색상</h2>

        <div class="flex flex-wrap gap-3">
            <button class="bg-primary hover:bg-primary-hover text-white px-5 py-2 rounded-full transition">
                로그인
            </button>

            <button class="bg-primary-hover text-white px-5 py-2 rounded-full">
                회원가입 hover
            </button>

            <button class="bg-screen-button text-white px-5 py-2 rounded-full">
                글쓰기
            </button>

            <button class="bg-chat-button text-white px-5 py-2 rounded-full">
                채팅하기
            </button>

            <button class="bg-danger text-white px-5 py-2 rounded-full">
                탈퇴하기
            </button>
        </div>
    </section>

    <!-- 배경/박스 색상 테스트 -->
    <section class="mb-8">
        <h2 class="font-bold mb-4">박스 색상</h2>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-bg-soft border border-border rounded-xl p-4">
                <p class="font-bold">연한색 배경</p>
                <p class="text-sm">bg-bg-soft</p>
            </div>

            <div class="bg-navbar border border-border rounded-xl p-4">
                <p class="font-bold">상단바 배경</p>
                <p class="text-sm">bg-navbar</p>
            </div>

            <div class="bg-chat-bg rounded-xl p-4">
                <p class="font-bold">채팅 배경</p>
                <p class="text-sm">bg-chat-bg</p>
            </div>

            <div class="bg-popup rounded-xl p-4">
                <p class="font-bold">팝업 배경</p>
                <p class="text-sm">bg-popup</p>
            </div>
        </div>
    </section>

    <!-- 채팅 UI 테스트 -->
    <section class="mb-8">
        <h2 class="font-bold mb-4">채팅 색상</h2>

        <div class="bg-chat-bg rounded-xl p-5 space-y-3">
            <div class="bg-white rounded-2xl px-4 py-3 w-fit max-w-xs">
                상대방 채팅입니다.
            </div>

            <div class="bg-my-chat rounded-2xl px-4 py-3 w-fit max-w-xs ml-auto">
                내 채팅입니다.
            </div>

            <button class="bg-chat-button text-white px-4 py-2 rounded-lg">
                전송
            </button>
        </div>
    </section>

    <!-- 게시판/카드 테스트 -->
    <section>
        <h2 class="font-bold mb-4">게시판 카드</h2>

        <div class="border border-border rounded-xl overflow-hidden">
            <div class="bg-navbar px-5 py-3 font-bold">
                전체 게시글
            </div>

            <div class="divide-y divide-border">
                <div class="px-5 py-3 flex justify-between">
                    <span>안녕하세요 될까요?</span>
                    <span class="text-primary">34</span>
                </div>

                <div class="px-5 py-3 flex justify-between">
                    <span>늘봄길 공지사항입니다.</span>
                    <span class="text-primary">12</span>
                </div>
            </div>
        </div>
    </section>

</div>

</body>
</html>
