<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tailwind v4 Test</title>
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 max-w-md w-full text-center">
    <h1 class="text-3xl font-extrabold text-blue-600 mb-4">
        Tailwind v4 작동 확인!
    </h1>

    <p class="text-slate-600 mb-6">
        안녕하세요, <span class="font-bold text-slate-900" th:text="${name}">사용자</span>님.<br>
    </p>

    <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-medium transition-all transform hover:scale-105 active:scale-95">
        확인 버튼
    </button>
</div>

</body>
</html>
