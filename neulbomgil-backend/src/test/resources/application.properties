spring.application.name=neulbomgil-backend-test
server.port=8088
# 테스트용 인메모리 데이터베이스 설정 (H2 DB)
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:neulbomgil_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=FALSE
spring.datasource.username=sa
spring.datasource.password=
# JPA/Hibernate 설정
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database=h2
# 외부 API Key 설정
vworld.api.key=test_vworld_api_key_placeholder
# SQL 로그
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.orm.jdbc.bind=TRACE
#spring.jpa.properties.hibernate.use_sql_comments=true
# JWT 설정
application.security.jwt.secret=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_neulbomgil_test_secret_key_32bytes
application.security.jwt.access-token-expiration=1800000
application.security.jwt.refresh-token-expiration=604800000
# 메일 설정
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test_mail_user
spring.mail.password=test_mail_password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
# 카카오 로그인 설정
kakao.auth.client=test_kakao_client_key
kakao.auth.client_secret_key=test_kakao_client_secret_key
kakao.auth.url=https://kauth.kakao.com
# 카카오 지도 설정
kakao.map.api-key=test_kakao_map_api_key
# 서버 URL 설정
url.location=localhost